name: site-ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run redirects:check
      - run: pnpm run audit:tokens
      - run: pnpm run audit:ops
      - run: pnpm run audit:pii
      - run: pnpm run a11y:charts
      - run: pnpm run build
      - run: pnpm run check-links
      - run: pnpm run check
      - run: pnpm run a11y:contrast
